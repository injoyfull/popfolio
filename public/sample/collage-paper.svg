<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" width="1000" height="1250">
  <rect width="1000" height="1250" fill="#eae4d6"/>
  <!-- torn paper layers -->
  <path d="M120 220 l360 -20 380 40 -10 300 -740 20 z" fill="#c94f4f" transform="rotate(-3 500 400)"/>
  <path d="M200 380 l520 30 -20 360 -520 -10 z" fill="#f2d06b" transform="rotate(2 460 560)"/>
  <path d="M150 640 l420 10 -10 300 -420 20 z" fill="#4d7ea8" transform="rotate(-2 360 800)"/>
  <!-- photo cutout -->
  <g transform="rotate(5 700 780)">
    <rect x="560" y="640" width="300" height="300" fill="#fff"/>
    <rect x="575" y="655" width="270" height="230" fill="#2f9e8f"/>
    <circle cx="710" cy="770" r="70" fill="#ffd23f"/>
  </g>
  <!-- tape -->
  <rect x="440" y="200" width="120" height="44" fill="#ffffff" fill-opacity="0.55" transform="rotate(-8 500 222)"/>
  <rect x="600" y="900" width="120" height="40" fill="#ffffff" fill-opacity="0.5" transform="rotate(6 660 920)"/>
  <text x="140" y="1150" font-family="Georgia, serif" font-size="42" fill="#2a2320">Cut &amp; Paste — 콜라주</text>
</svg>
