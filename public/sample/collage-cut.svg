<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" width="1000" height="1250">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <rect width="26" height="26" fill="#f4a0c0"/>
      <circle cx="8" cy="8" r="6" fill="#c0356b"/>
    </pattern>
  </defs>
  <rect width="1000" height="1250" fill="#f3efe6"/>
  <!-- halftone block -->
  <rect x="120" y="160" width="360" height="360" fill="url(#dots)" transform="rotate(-4 300 340)"/>
  <!-- magazine circles -->
  <circle cx="720" cy="320" r="150" fill="#2e7d5b"/>
  <circle cx="720" cy="320" r="90" fill="#e9e2d3"/>
  <circle cx="720" cy="320" r="40" fill="#e4572e"/>
  <!-- cut strip -->
  <rect x="140" y="600" width="720" height="90" fill="#233d7b" transform="rotate(2 500 645)"/>
  <!-- big cut letter A -->
  <path d="M300 1080 L430 760 L560 1080 M345 980 H515" fill="none" stroke="#e4a11b" stroke-width="46" stroke-linejoin="round"/>
  <!-- torn photo square -->
  <g transform="rotate(-6 720 900)">
    <rect x="600" y="780" width="240" height="240" fill="#fff"/>
    <rect x="614" y="794" width="212" height="180" fill="#7a5cc0"/>
  </g>
  <text x="140" y="1170" font-family="Arial, sans-serif" font-weight="700" font-size="40" fill="#2a2320">MIXED CUT</text>
</svg>
